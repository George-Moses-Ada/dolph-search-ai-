    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const svgPaths = {
            pafd8c00: "M1.5 1.5h30v25h-30z",
            p17ee0e80: "M8 8h16v12H8z",
            p39108700: "M10 10h12v8H10z",
            p31950f00: "M12 12h8v4h-8z",
            p1777980: "M14 14h4v2h-4z",
            p3212c800: "M16 16h2v1h-2z",
            p18820600: "M15 15h4v1h-4z",
            p257326e0: "M17 17h2v1h-2z"
        };

        function App() {
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [searchTypes, setSearchTypes] = useState(['All Search']);
            const [dropdownOpen, setDropdownOpen] = useState(false);
            const dropdownRef = useRef(null);
            const [user, setUser] = useState(null);

            const searchOptions = ['All Search', 'PubMed', 'arXiv', 'Semantic Scholar'];

            const handleLogout = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                setUser(null);
            };

            useEffect(() => {
                const userData = localStorage.getItem('user');
                if (userData) {
                    setUser(JSON.parse(userData));
                }

                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setDropdownOpen(false);
                    }
                };

                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const toggleSearchType = (type) => {
                if (type === 'All Search') {
                    setSearchTypes(['All Search']);
                } else {
                    setSearchTypes(prev => {
                        const newTypes = prev.filter(t => t !== 'All Search');
                        if (newTypes.includes(type)) {
                            return newTypes.length > 1 ? newTypes.filter(t => t !== type) : ['All Search'];
                        } else {
                            return [...newTypes, type];
                        }
                    });
                }
            };

            const getSearchTypeDisplay = () => {
                if (searchTypes.includes('All Search')) return 'All Search';
                if (searchTypes.length === 1) return searchTypes[0];
                return `${searchTypes.length} selected`;
            };

            const performSearch = () => {
                const searchInput = document.querySelector('input[type="text"]');
                const query = searchInput.value.trim();
                const types = searchTypes.join(',');
                
                if (!query) {
                    alert('Please enter a search query');
                    return;
                }
                
                // Store search in localStorage for history
                const searchHistory = JSON.parse(localStorage.getItem('searchHistory') || '[]');
                searchHistory.unshift({
                    query: query,
                    types: searchTypes,
                    timestamp: new Date(),
                    results: Math.floor(Math.random() * 50) + 10
                });
                localStorage.setItem('searchHistory', JSON.stringify(searchHistory.slice(0, 50)));
                
                // Redirect to search results
                window.location.href = `search-results.html?query=${encodeURIComponent(query)}&types=${encodeURIComponent(types)}`;
            };

            return (

                                    Get evidence-based answers from academic papers, citations etc. with AI-powered research assistance
                                </p>

                                {/* Search bar */}
                                <div className="flex flex-col sm:flex-row gap-2 max-w-3xl mx-auto">
                                    <input
                                        type="text"
                                        placeholder="Ask a research question (e.g., 'Does intermittent fasting improve metabolic health?')"
                                        className="flex-1 px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    />
                                    <div ref={dropdownRef} className="relative">
                                        <button
                                            onClick={() => setDropdownOpen(!dropdownOpen)}
                                            className="px-4 py-3 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-left flex items-center justify-between min-w-[140px]"
                                        >
                                            <span>{getSearchTypeDisplay()}</span>
                                            <svg className="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                                            </svg>
                                        </button>
                                        
                                        {dropdownOpen && (
                                            <div className="absolute top-full left-0 mt-1 w-full bg-white border border-gray-300 rounded-lg shadow-lg z-10">
                                                {searchOptions.map(option => (
                                                    <label key={option} className="flex items-center px-3 py-2 hover:bg-gray-50 cursor-pointer">
                                                        <input
                                                            type="checkbox"
                                                            checked={searchTypes.includes(option)}
                                                            onChange={() => toggleSearchType(option)}
                                                            className="mr-2"
                                                        />
                                                        <span className="text-sm">{option}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    <button onClick={performSearch} className="bg-[#2563eb] text-white px-8 py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-blue-600">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                        </svg>
                                        <span>Search</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
