<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plans and Pricing - Dolph Search</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .pricing-card {
            transition: all 0.3s ease;
        }
        .pricing-card:hover {
            transform: translateY(-8px);
        }
        .featured-badge {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function Plans() {
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [billingCycle, setBillingCycle] = useState('monthly');
            const [selectedPlan, setSelectedPlan] = useState(null);
            const [user, setUser] = useState(null);

            const handleLogout = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                setUser(null);
            };

            useEffect(() => {
                const userData = localStorage.getItem('user');
                if (userData) {
                    setUser(JSON.parse(userData));
                }
            }, []);

            const plans = [
                {
                    id: 'free',
                    name: 'Free',
                    price: billingCycle === 'monthly' ? 0 : 0,
                    yearlyPrice: 0,
                    description: 'Perfect for getting started',
                    features: [
                        '10 searches per day',
                        'Basic search features',
                        'Limited paper access',
                        'Community support'
                    ],
                    limitations: [
                        'No advanced AI features',
                        'No file uploads',
                        'Basic search only'
                    ],
                    popular: false,
                    buttonText: 'Current Plan',
                    buttonStyle: 'bg-gray-100 text-gray-800 hover:bg-gray-200'
                },
                {
                    id: 'pro',
                    name: 'Pro',
                    price: billingCycle === 'monthly' ? 19 : 16,
                    yearlyPrice: 192,
                    description: 'For serious researchers',
                    features: [
                        'Unlimited searches',
                        'Advanced AI features',
                        'Full paper access',
                        'File uploads (PDF, DOCX)',
                        'Priority support',
                        'Export results',
                        'Search history'
                    ],
                    limitations: [],
                    popular: true,
                    buttonText: billingCycle === 'monthly' ? 'Start Pro Trial' : 'Start Pro Trial',
                    buttonStyle: 'bg-[#2563eb] text-white hover:bg-blue-600'
                },
                {
                    id: 'team',
                    name: 'Team',
                    price: billingCycle === 'monthly' ? 49 : 41,
                    yearlyPrice: 492,
                    description: 'For research teams',
                    features: [
                        'Everything in Pro',
                        '5 team members',
                        'Collaborative workspaces',
                        'Team search history',
                        'API access',
                        'Custom integrations',
                        'Dedicated support',
                        'Advanced analytics'
                    ],
                    limitations: [],
                    popular: false,
                    buttonText: 'Contact Sales',
                    buttonStyle: 'bg-gray-100 text-gray-800 hover:bg-gray-200'
                }
            ];

            const handlePlanSelect = (plan) => {
                if (plan.id === 'team') {
                    // Open contact form or redirect
                    alert('Please contact our sales team for Team plans');
                } else if (plan.id === 'pro') {
                    setSelectedPlan(plan);
                    // Redirect to signup or payment
                    window.location.href = 'signup.html?plan=' + plan.id;
                }
            };

            const formatPrice = (price) => {
                return price === 0 ? 'Free' : `$${price}`;
            };

                                        }`}>
                                            {plan.popular && (
                                                <div className="absolute -top-4 left-1/2 transform -translate-x-1/2">
                                                    <span className="bg-blue-500 text-white px-4 py-1 rounded-full text-sm font-medium featured-badge">
                                                        Most Popular
                                                    </span>
                                                </div>
                                            )}
                                            
                                            <div className="p-8">
                                                <h3 className="text-2xl font-bold text-gray-900 mb-2">{plan.name}</h3>
                                                <p className="text-gray-600 mb-6">{plan.description}</p>
                                                
                                                <div className="mb-6">
                                                    <div className="flex items-baseline">
                                                        <span className="text-4xl font-bold text-gray-900">
                                                            {formatPrice(plan.price)}
                                                        </span>
                                                        {plan.price > 0 && (
                                                            <span className="text-gray-600 ml-2">
                                                                /{billingCycle === 'monthly' ? 'month' : 'month'}
                                                            </span>
                                                        )}
                                                    </div>
                                                    {billingCycle === 'yearly' && plan.price > 0 && (
                                                        <p className="text-sm text-green-600 mt-1">
                                                            ${plan.yearlyPrice} billed annually
                                                        </p>
                                                    )}
                                                </div>

                                                <button
                                                    onClick={() => handlePlanSelect(plan)}
                                                    className={`w-full py-3 px-6 rounded-lg font-medium transition-colors ${plan.buttonStyle}`}
                                                >
                                                    {plan.buttonText}
                                                </button>

                                                <div className="mt-8">
                                                    <ul className="space-y-4">
                                                        {plan.features.map((feature, index) => (
                                                            <li key={index} className="flex items-start">
                                                                <svg className="w-5 h-5 text-green-500 mr-3 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                                                                </svg>
                                                                <span className="text-gray-700">{feature}</span>
                                                            </li>
                                                        ))}
                                                        {plan.limitations.map((limitation, index) => (
                                                            <li key={index} className="flex items-start text-gray-400">
                                                                <svg className="w-5 h-5 mr-3 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                                                </svg>
                                                                <span>{limitation}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* FAQ Section */}
                                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
                                    <h2 className="text-2xl font-bold text-gray-900 mb-6">Frequently Asked Questions</h2>
                                    
                                    <div className="space-y-6">
                                        <div>
                                            <h3 className="text-lg font-semibold text-gray-900 mb-2">Can I change plans anytime?</h3>
                                            <p className="text-gray-600">Yes, you can upgrade or downgrade your plan at any time. Changes will be reflected in your next billing cycle.</p>
                                        </div>
                                        
                                        <div>
                                            <h3 className="text-lg font-semibold text-gray-900 mb-2">What's included in the free trial?</h3>
                                            <p className="text-gray-600">The Pro plan includes a 14-day free trial with full access to all features.</p>
                                        </div>
                                        
                                        <div>
                                            <h3 className="text-lg font-semibold text-gray-900 mb-2">Do you offer refunds?</h3>
                                            <p className="text-gray-600">We offer a 30-day money-back guarantee for all paid plans.</p>
                                        </div>
                                        
                                        <div>
                                            <h3 className="text-lg font-semibold text-gray-900 mb-2">Can I cancel anytime?</h3>
                                            <p className="text-gray-600">Yes, you can cancel your subscription at any time with no cancellation fees.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<Plans />, document.getElementById('root'));
    </script>
</body>
</html>
