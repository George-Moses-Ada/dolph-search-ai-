<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolph Search</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [searchType, setSearchType] = useState('All Search');

            const performSearch = () => {
                const searchInput = document.querySelector('input[type="text"]');
                const query = searchInput.value.trim();
                
                if (!query) {
                    alert('Please enter a search query');
                    return;
                }
                
                // Store search in localStorage for history
                const searchHistory = JSON.parse(localStorage.getItem('searchHistory') || '[]');
                searchHistory.unshift({
                    query: query,
                    type: searchType,
                    timestamp: new Date(),
                    results: Math.floor(Math.random() * 50) + 10
                });
                localStorage.setItem('searchHistory', JSON.stringify(searchHistory.slice(0, 50)));
                
                // Redirect to search results
                window.location.href = `search-results.html?query=${encodeURIComponent(query)}&type=${searchType}`;
            };

            return (
                <div className="flex h-screen bg-white">
                    {/* Sidebar - Desktop */}
                    <aside className={`
                        fixed lg:static inset-y-0 left-0 z-50 w-64 bg-[#f9f9f9] border-r border-[rgba(13,13,13,0.05)]
                        transform transition-transform duration-300 ease-in-out
                        ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}
                    `}>
                        <div className="flex flex-col h-full">
                            {/* Logo */}
                            <div className="p-6 border-b border-[rgba(13,13,13,0.05)]">
                                <a href="standalone.html" className="flex items-center gap-3">
                                    <svg className="w-8 h-8 text-[#2563eb]" viewBox="0 0 33 28" fill="none">
                                        <path d="M1.5 1.5h30v25h-30z" stroke="currentColor" strokeWidth="3"/>
                                        <path d="M8 8h16v12H8z" fill="currentColor"/>
                                        <path d="M10 10h12v8H10z" fill="white"/>
                                        <path d="M12 12h8v4h-8z" fill="currentColor"/>
                                        <path d="M14 14h4v2h-4z" fill="white"/>
                                        <path d="M16 16h2v1h-2z" fill="currentColor"/>
                                        <path d="M15 15h4v1h-4z" fill="white"/>
                                        <path d="M17 17h2v1h-2z" fill="currentColor"/>
                                    </svg>
                                    <span className="text-xl font-bold text-[#111827]">Dolph Search</span>
                                </a>
                            </div>

                            {/* Navigation */}
                            <nav className="flex-1 p-4">
                                <ul className="space-y-2">
                                    <li>
                                        <a href="new-chat.html" className="flex items-center gap-3 px-4 py-3 text-[#111827] bg-[#dbeafe] rounded-lg">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                                            </svg>
                                            <span>New Chat</span>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="history.html" className="flex items-center gap-3 px-4 py-3 text-[#6b7280] hover:text-[#111827] hover:bg-gray-100 rounded-lg">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                            </svg>
                                            <span>History</span>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="images.html" className="flex items-center gap-3 px-4 py-3 text-[#6b7280] hover:text-[#111827] hover:bg-gray-100 rounded-lg">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                            </svg>
                                            <span>Images</span>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="plans.html" className="flex items-center gap-3 px-4 py-3 text-[#6b7280] hover:text-[#111827] hover:bg-gray-100 rounded-lg">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                            </svg>
                                            <span>Plans</span>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="settings.html" className="flex items-center gap-3 px-4 py-3 text-[#6b7280] hover:text-[#111827] hover:bg-gray-100 rounded-lg">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37.996.608 2.296.07 2.572-1.065z" />
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                            </svg>
                                            <span>Settings</span>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="help.html" className="flex items-center gap-3 px-4 py-3 text-[#6b7280] hover:text-[#111827] hover:bg-gray-100 rounded-lg">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                            </svg>
                                            <span>Help</span>
                                        </a>
                                    </li>
                                </ul>
                            </nav>

                            {/* User section */}
                            <div className="p-4 border-t border-[rgba(13,13,13,0.05)]">
                                <div className="flex items-center gap-3 px-4 py-3">
                                    <div className="w-8 h-8 bg-[#2563eb] rounded-full flex items-center justify-center">
                                        <span className="text-white text-sm font-medium">U</span>
                                    </div>
                                    <div className="flex-1">
                                        <p className="text-sm font-medium text-[#111827]">User</p>
                                        <p className="text-xs text-[#6b7280]">Free Plan</p>
                                    </div>
                                    <button className="text-[#6b7280] hover:text-[#111827]">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Mobile overlay */}
                    {sidebarOpen && (
                        <div
                            className="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden"
                            onClick={() => setSidebarOpen(false)}
                        />
                    )}

                    {/* Main content */}
                    <main className="flex-1 overflow-auto">
                        {/* Header */}
                        <header className="h-[52px] bg-white border-b border-gray-200 flex items-center justify-between px-4 sticky top-0 z-30">
                            <div className="flex-1" />

                            <div className="flex items-center gap-2">
                                <a href="login.html" className="bg-[#2563eb] text-white px-4 py-2 rounded-full text-sm hover:bg-blue-600">
                                    Log in
                                </a>
                                <a href="signup.html" className="bg-white border border-gray-300 px-4 py-2 rounded-full text-sm hover:bg-gray-50">
                                    Sign up for free
                                </a>
                            </div>
                        </header>

                        {/* Hero section */}
                        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 via-white to-purple-50">
                            <div className="max-w-6xl mx-auto px-6 py-12 text-center">
                                <h1 className="text-5xl font-bold text-[#111827] mb-6">
                                    Dolph Search
                                </h1>
                                <p className="text-xl text-[#6b7280] mb-8 max-w-3xl mx-auto">
                                    Get evidence-based answers from academic papers, citations etc. with AI-powered research assistance
                                </p>

                                {/* Search bar */}
                                <div className="flex flex-col sm:flex-row gap-2 max-w-3xl mx-auto">
                                    <input
                                        type="text"
                                        placeholder="Ask a research question (e.g., 'Does intermittent fasting improve metabolic health?')"
                                        className="flex-1 px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    />
                                    <select 
                                        value={searchType}
                                        onChange={(e) => setSearchType(e.target.value)}
                                        className="px-4 py-3 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    >
                                        <option>All Search</option>
                                        <option>PubMed</option>
                                        <option>arXiv</option>
                                        <option>Semantic Scholar</option>
                                    </select>
                                    <button onClick={performSearch} className="bg-[#2563eb] text-white px-8 py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-blue-600">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                        </svg>
                                        <span>Search</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
