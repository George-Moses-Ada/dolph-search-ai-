<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Chat - Dolph Search</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .chat-message {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2563eb;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function NewChat() {
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [searchTypes, setSearchTypes] = useState(['All Search']);
            const [dropdownOpen, setDropdownOpen] = useState(false);
            const dropdownRef = useRef(null);
            const [user, setUser] = useState(null);
            const [messages, setMessages] = useState([
                {
                    id: 1,
                    type: 'ai',
                    content: 'Welcome to Dolph Search! I\'m your AI research assistant. Ask me anything about academic papers, and I\'ll help you find evidence-based answers.',
                    timestamp: new Date()
                }
            ]);
            const [inputValue, setInputValue] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const messagesEndRef = useRef(null);

            const searchOptions = ['All Search', 'PubMed', 'arXiv', 'Semantic Scholar'];

            const handleLogout = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                setUser(null);
            };

            useEffect(() => {
                const userData = localStorage.getItem('user');
                if (userData) {
                    setUser(JSON.parse(userData));
                }

                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setDropdownOpen(false);
                    }
                };

                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const toggleSearchType = (type) => {
                if (type === 'All Search') {
                    setSearchTypes(['All Search']);
                } else {
                    setSearchTypes(prev => {
                        const newTypes = prev.filter(t => t !== 'All Search');
                        if (newTypes.includes(type)) {
                            return newTypes.length > 1 ? newTypes.filter(t => t !== type) : ['All Search'];
                        } else {
                            return [...newTypes, type];
                        }
                    });
                }
            };

            const getSearchTypeDisplay = () => {
                if (searchTypes.includes('All Search')) return 'All Search';
                if (searchTypes.length === 1) return searchTypes[0];
                return `${searchTypes.length} selected`;
            };

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const sendMessage = async () => {
                if (!inputValue.trim()) return;

                const userMessage = {
                    id: Date.now(),
                    type: 'user',
                    content: inputValue,
                    timestamp: new Date()
                };

                setMessages(prev => [...prev, userMessage]);
                setInputValue('');
                setIsTyping(true);

                // Simulate AI response
                setTimeout(() => {
                    const searchTypesText = searchTypes.includes('All Search') 
                        ? 'all databases' 
                        : searchTypes.join(', ');
                    const aiMessage = {
                        id: Date.now() + 1,
                        type: 'ai',
                        content: `I'm searching through ${searchTypesText} to answer your question: "${userMessage.content}". Let me find the most relevant research papers for you...`,
                        timestamp: new Date()
                    };
                    setMessages(prev => [...prev, aiMessage]);
                    setIsTyping(false);
                }, 1500);
            };

            const handleKeyPress = (e) => {
                    sendMessage();
                }
            };

            return (
                <div className="flex h-screen bg-white">
                    {/* Sidebar */}
                    <aside className={`
                        fixed lg:static inset-y-0 left-0 z-50 w-64 bg-[#f9f9f9] border-r border-[rgba(13,13,13,0.05)]
                        transform transition-transform duration-300 ease-in-out
                        ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}
                    `}>
                        <div className="flex flex-col h-full">
                            {/* Logo */}
                            <div className="flex items-center justify-between p-4 h-[52px]">

                        />

                    <main className="flex-1 flex flex-col overflow-hidden">
                        {/* Header */}
                        <header className="h-[52px] bg-white border-b border-gray-200 flex items-center justify-between px-4 sticky top-0 z-30">
                            <div className="flex items-center gap-2">
                                <button
                                    onClick={() => setSidebarOpen(true)}
                                    className="lg:hidden p-2 hover:bg-gray-100 rounded-lg"
                                >
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                                    </svg>
                                </button>
                                <a href="standalone.html" className="hidden lg:flex items-center gap-2 text-gray-600 hover:text-gray-900 px-2 py-1 rounded hover:bg-gray-100">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                                    </svg>
                                    <span className="text-sm">Back</span>
                                </a>
                            </div>

                            <div className="flex items-center gap-2">
                                {user ? (
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 bg-[#2563eb] rounded-full flex items-center justify-center">
                                            <span className="text-white text-sm font-medium">{user.name.charAt(0).toUpperCase()}</span>
                                        </div>
                                        <span className="text-sm text-[#111827]">{user.name}</span>
                                        <button onClick={handleLogout} className="text-sm text-[#6b7280] hover:text-[#111827]">
                                            Log out
                                        </button>
                                    </div>
                                ) : (
                                    <>
                                        <a href="login.html" className="bg-[#2563eb] text-white px-4 py-2 rounded-full text-sm hover:bg-blue-600">
                                            Log in
                                        </a>
                                        <a href="signup.html" className="bg-white border border-gray-300 px-4 py-2 rounded-full text-sm hover:bg-gray-50">
                                            Sign up for free
                                        </a>
                                    </>
                                )}
                            </div>
                        </header>

                        {/* Chat content */}
                        <div className="flex-1 overflow-y-auto bg-gray-50">
                            <div className="max-w-4xl mx-auto">
                                {/* Messages */}
                                <div className="p-4 space-y-4">
                                    {messages.map(message => (
                                        <div key={message.id} className={`chat-message flex ${message.type === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-2xl ${message.type === 'user' ? 'order-2' : 'order-1'}`}>
                                                <div className={`px-4 py-3 rounded-lg ${
                                                    message.type === 'user' 
                                                        ? 'bg-[#2563eb] text-white' 
                                                        : 'bg-white border border-gray-200 text-gray-800'
                                                }`}>
                                                    <p className="text-sm">{message.content}</p>
                                                </div>
                                                <p className={`text-xs text-gray-500 mt-1 ${
                                                    message.type === 'user' ? 'text-right' : 'text-left'
                                                }`}>
                                                    {message.timestamp.toLocaleTimeString()}
                                                </p>
                                            </div>
                                        </div>
                                    ))}

                                    {/* Typing indicator */}
                                    {isTyping && (
                                        <div className="flex justify-start">
                                            <div className="bg-white border border-gray-200 px-4 py-3 rounded-lg">
                                                <div className="typing-indicator">
                                                    <span></span>
                                                    <span></span>
                                                    <span></span>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    <div ref={messagesEndRef} />
                                </div>

                                {/* Input area */}
                                <div className="border-t border-gray-200 bg-white p-4">
                                    <div className="flex flex-col sm:flex-row gap-3">
                                        <input
                                            type="text"
                                            value={inputValue}
                                            onChange={(e) => setInputValue(e.target.value)}
                                            onKeyPress={handleKeyPress}
                                            placeholder="Ask a research question..."
                                            className="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        />
                                        <div ref={dropdownRef} className="relative">
                                            <button
                                                onClick={() => setDropdownOpen(!dropdownOpen)}
                                                className="px-4 py-3 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-left flex items-center justify-between min-w-[140px]"
                                            >
                                                <span>{getSearchTypeDisplay()}</span>
                                                <svg className="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                                                </svg>
                                            </button>
                                            
                                            {dropdownOpen && (
                                                <div className="absolute top-full left-0 mt-1 w-full bg-white border border-gray-300 rounded-lg shadow-lg z-10">
                                                    {searchOptions.map(option => (
                                                        <label key={option} className="flex items-center px-3 py-2 hover:bg-gray-50 cursor-pointer">
                                                            <input
                                                                type="checkbox"
                                                                checked={searchTypes.includes(option)}
                                                                onChange={() => toggleSearchType(option)}
                                                                className="mr-2"
                                                            />
                                                            <span className="text-sm">{option}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                        <button
                                            onClick={sendMessage}
                                            disabled={!inputValue.trim() || isTyping}
                                            className="bg-[#2563eb] text-white px-6 py-3 rounded-lg hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
                </div>
                </div>
            );
        }

        ReactDOM.render(<NewChat />, document.getElementById('root'));
    </script>
</body>
</html>
