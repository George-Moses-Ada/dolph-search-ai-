services:
  # Frontend Service
  - type: web
    name: dolph-search-frontend
    env: static
    buildCommand: ""
    staticPublishPath: .
    routes:
      - source: /
        destination: /index.html
      - source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production

  # Backend Service
  - type: web
    name: dolph-search-backend
    env: node
    rootDirectory: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true

