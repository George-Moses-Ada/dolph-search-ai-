        function SearchResults() {
            const [query, setQuery] = useState('');
            const [searchTypes, setSearchTypes] = useState([]);
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(true);
            const [user, setUser] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [sortOption, setSortOption] = useState('Best Match');
            const [displayOptions, setDisplayOptions] = useState({
                density: 'comfortable',
                showAuthors: true,
                showAbstract: true,
                showJournal: true,
                showDOI: true,
                showKeywords: true,
                showCitations: true,
                resultsPerPage: 20
            });
            const [selectedFilters, setSelectedFilters] = useState({
                publicationDate: null,
                textAvailability: [],
                articleAttribute: false,
                articleTypes: []
            });
            const timelineRef = useRef(null);

            const handleLogout = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                setUser(null);
            };

            useEffect(() => {
                // Check if user is logged in
                const userData = localStorage.getItem('user');
                if (userData) {
                    setUser(JSON.parse(userData));
                } else {
                    const urlParams = new URLSearchParams(window.location.search);
                    const searchQuery = urlParams.get('query');
                    const searchTypesParam = urlParams.get('types') || 'All Search';
                    
                    if (searchQuery) {
                        sessionStorage.setItem('pendingSearch', JSON.stringify({
                            query: searchQuery,
                            types: searchTypesParam
                        }));
                    }
                    
                    alert('Please sign in to view search results');
                    window.location.href = 'login.html';
                    return;
                }

                // Get query from URL parameters
                const urlParams = new URLSearchParams(window.location.search);
                const searchQuery = urlParams.get('query');
                const searchTypesParam = urlParams.get('types') || 'All Search';
                const searchTypes = searchTypesParam.split(',').filter(t => t.trim());
                
                if (searchQuery) {
                    setQuery(searchQuery);
                    setSearchTypes(searchTypes);
                    performSearch(searchQuery, searchTypes);
                } else {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                // Initialize timeline chart
                if (timelineRef.current) {
                    const ctx = timelineRef.current.getContext('2d');
                    const years = Object.keys(timelineData).sort();
                    const counts = years.map(year => timelineData[year]);
                    
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: years,
                            datasets: [{
                                label: 'Publications',
                                data: counts,
                                backgroundColor: 'rgba(37, 99, 235, 0.6)',
                                borderColor: 'rgba(37, 99, 235, 1)',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    display: false
                                },
                                tooltip: {
                                    callbacks: {
                                        title: (items) => `Year: ${items[0].label}`,
                                        label: (item) => `Publications: ${item.raw}`
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    display: false
                                },
                                y: {
                                    display: false
                                }
                            },
                            onClick: (event, elements) => {
                                if (elements.length > 0) {
                                    const index = elements[0].index;
                                    const year = years[index];
                                    console.log('Selected year:', year);
                                }
                            }
                        }
                    });
                }
            }, []);

            const performSearch = async (searchQuery, types) => {
                setLoading(true);
                
                try {
                    const response = await fetch(`${API_URL}/api/search`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ 
                            query: searchQuery, 
                            sources: types 
                        }),
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Search failed');
                    }

                    const transformedResults = data.results.map((result, index) => ({
                        id: index + 1,
                        title: result.title || 'No title',
                        authors: result.authors || '',
                        journal: result.journal || '',
                        year: result.publicationDate || '',
                        abstract: result.abstract || '',
                        confidence: 85,
                        citations: result.citationCount || 0,
                        doi: result.doi || '',
                        relevance: 'High',
                        source: result.source,
                        url: result.url || '',
                        articleType: 'Article',
                        keywords: ['research', 'study', 'analysis']
                    }));

                    setResults(transformedResults);
                } catch (error) {
                    console.error('Search error:', error);
                    const sampleResults = [
                        {
                            id: 1,
                            title: "Intermittent Fasting and Metabolic Health: A Comprehensive Review",
                            authors: "Smith, J., Johnson, M., Brown, K.",
                            journal: "Nature Metabolism",
                            year: 2023,
                            abstract: "This comprehensive review examines the effects of intermittent fasting on metabolic health markers including insulin sensitivity, glucose regulation, and lipid profiles. Our analysis of 45 randomized controlled trials shows significant improvements in metabolic parameters.",
                            confidence: 92,
                            citations: 156,
                            doi: "10.1038/s42255-023-00123",
                            relevance: "High",
                            source: "Mock Data",
                            url: "",
                            articleType: "Review",
                            keywords: ["intermittent fasting", "metabolic health", "insulin sensitivity"]
                        },
                        {
                            id: 2,
                            title: "Time-Restricted Eating Improves Glucose Tolerance in Prediabetic Patients",
                            authors: "Davis, R., Wilson, S., Martinez, L.",
                            journal: "Diabetes Care",
                            year: 2022,
                            abstract: "A randomized controlled trial investigating the effects of time-restricted eating on glucose tolerance in 120 prediabetic patients over a 12-week period. Results show significant improvements in fasting glucose and HbA1c levels.",
                            confidence: 88,
                            citations: 89,
                            doi: "10.2337/dc22-1234",
                            relevance: "High",
                            source: "Mock Data",
                            url: "",
                            articleType: "Clinical Trial",
                            keywords: ["time-restricted eating", "glucose tolerance", "prediabetes"]
                        }
                    ];
                    setResults(sampleResults);
                } finally {
                    setLoading(false);
                }
            };

            const generateSummary = (searchQuery, results) => {
                if (results.length === 0) {
                    return {
                        text: `No results found for "${searchQuery}". Try adjusting your search terms or selecting different sources.`,
                        confidence: 0,
                        consensus: 'None',
                        quality: 'N/A'
                    };
                }

                const titles = results.map(r => r.title.toLowerCase()).join(' ');
                const abstracts = results.map(r => r.abstract.toLowerCase()).join(' ');
                const allText = titles + ' ' + abstracts;

                const words = allText.match(/\b\w{4,}\b/g) || [];
                const wordFreq = {};
                words.forEach(word => {
                    wordFreq[word] = (wordFreq[word] || 0) + 1;
                });

                const topKeywords = Object.entries(wordFreq)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 5)
                    .map(([word]) => word);

                const avgConfidence = results.length > 0 
                    ? Math.round(results.reduce((sum, r) => sum + (r.confidence || 85), 0) / results.length)
                    : 0;

                const totalCitations = results.reduce((sum, r) => sum + (r.citations || 0), 0);
                const avgCitations = results.length > 0 ? Math.round(totalCitations / results.length) : 0;

                let consensus = 'Moderate';
                if (avgConfidence >= 90) consensus = 'Strong';
                else if (avgConfidence >= 70) consensus = 'Moderate';
                else consensus = 'Limited';

                let quality = 'High';
                if (avgCitations >= 50) quality = 'High';
                else if (avgCitations >= 20) quality = 'Medium';
                else quality = 'Low';

                const summaryText = `Based on the analysis of ${results.length} research papers related to "${searchQuery}", the findings indicate key themes around ${topKeywords.slice(0, 3).join(', ')}. The studies show an average of ${avgCitations} citations per paper, suggesting ${quality.toLowerCase()} impact in the field. The overall confidence in these findings is ${avgConfidence}%, indicating ${consensus.toLowerCase()} consensus among the selected sources.`;

                return {
                    text: summaryText,
                    confidence: avgConfidence,
                    consensus: consensus,
                    quality: quality
                };
            };

            const downloadPaper = (result, format) => {
                try {
                    const filename = `${result.title.replace(/[^a-z0-9\s]/gi, '_').toLowerCase()}.${format}`;
                    
                    let content = '';
                    let mimeType = 'text/plain';
                    
                    if (format === 'txt') {
                        content = `${result.title}\n${result.authors}\n${result.journal}, ${result.year}\n\nAbstract:\n${result.abstract}\n\nDOI: ${result.doi}\nCitations: ${result.citations}`;
                        mimeType = 'text/plain';
                    } else if (format === 'doc') {
                        content = `<html><head><title>${result.title}</title></head><body><h1>${result.title}</h1><p><strong>Authors:</strong> ${result.authors}</p><p><strong>Journal:</strong> ${result.journal}, ${result.year}</p><h2>Abstract</h2><p>${result.abstract}</p><p><strong>DOI:</strong> ${result.doi}</p><p><strong>Citations:</strong> ${result.citations}</p></body></html>`;
                        mimeType = 'application/msword';
                    } else if (format === 'pdf') {
                        content = `${result.title}\n${result.authors}\n${result.journal}, ${result.year}\n\nAbstract:\n${result.abstract}\n\nDOI: ${result.doi}\nCitations: ${result.citations}`;
                        mimeType = 'application/pdf';
                    }
                    
                    const blob = new Blob([content], { type: mimeType });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    
                    console.log(`Downloaded ${filename} successfully`);
                } catch (error) {
                    console.error('Download failed:', error);
                    alert('Download failed. Please try again.');
                }
            };

            const getDensityClass = () => {
                switch (displayOptions.density) {
                    case 'compact': return 'p-4';
                    case 'comfortable': return 'p-6';
                    case 'spacious': return 'p-8';
                    default: return 'p-6';
                }
            };

            return (

                            </div>

                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                />
                                <button
                                    onClick={() => performSearch(query, searchTypes)}

                                        <span className="text-white text-sm font-medium">{user.name.charAt(0).toUpperCase()}</span>
                                    </div>
                                    <span className="text-sm text-[#111827]">{user.name}</span>

                    {/* Main Content Area */}

                                {/* Results by Year */}

                                    </div>
                                    <div className="h-40 bg-gray-50 rounded border border-gray-200">

                                    <div className="space-y-2">
                                        <label className="flex items-center">
                                            <input type="radio" name="pubDate" className="mr-2" />

                                        </label>

                                            <input type="radio" name="pubDate" className="mr-2" />

                                        </label>
                                    </div>
                                </div>

                                {/* Text Availability */}
                                <div className="mb-6">
                                    <h3 className="font-semibold text-gray-900 mb-3">TEXT AVAILABILITY</h3>
                                    <div className="space-y-2">
                                        <label className="flex items-center">
                                            <input type="checkbox" className="mr-2" />
                                            <span className="text-sm">Abstract</span>
                                        </label>
                                        <label className="flex items-center">
                                            <input type="checkbox" className="mr-2" />
                                            <span className="text-sm">Free Full Text</span>
                                        </label>
                                        <label className="flex items-center">

                                        </label>
                                    </div>
                                </div>

                                {/* Article Attribute */}
                                <div className="mb-6">
                                    <h3 className="font-semibold text-gray-900 mb-3">ARTICLE ATTRIBUTE</h3>
                                    <label className="flex items-center">

                                    </label>
                                </div>

                                {/* Article Type */}
                                <div className="mb-6">

                                    <div className="space-y-2">
                                        <label className="flex items-center">
                                            <input type="checkbox" className="mr-2" />

                                        </label>

                                        <label className="flex items-center">

                                        </label>
                                        <label className="flex items-center">
                                            <input type="checkbox" className="mr-2" />
                                            <span className="text-sm">Review</span>
                                        </label>
                                        <label className="flex items-center">
                                            <input type="checkbox" className="mr-2" />
                                            <span className="text-sm">Systematic Review</span>
                                        </label>
                                    </div>
                                    <button className="text-sm text-blue-600 hover:text-blue-700 mt-2">See all article type filters</button>
                                </div>

                                {/* Additional Filters */}
                                <div className="mb-6">
                                    <button className="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">

                                    </button>
                                </div>

                                {/* Filter Actions */}

                                    </button>

                                        Reset Filters Menu

                                </div>
                            </div>

                        {/* Main Search Results */}

                                    >
                                        <option>Best Match</option>
                                        <option>Newest</option>

                                {/* Results Header */}

                                </div>

                                {/* Loading state */}
                                {loading ? (
                                    <div className="bg-white rounded-lg shadow-sm border border-gray-100 p-12 text-center">
                                        <div className="inline-flex items-center gap-2">
                                            <svg className="w-6 h-6 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.001 0 01-15.357-2m15.357 2H15" />
                                            </svg>
                                            <span>Searching through academic databases...</span>
                                        </div>
                                    </div>
                                ) : (
                                    <>
                                        {/* Results list */}
                                        <div className="space-y-4 mb-6">
                                            {results.map(result => (
                                                <div key={result.id} className={`result-item bg-white rounded-lg shadow-sm border border-gray-200 ${getDensityClass()}`}>
                                                    <div className="flex items-start gap-4">
                                                        <input type="checkbox" className="mt-1" />
                                                        <div className="flex-1">
                                                            <h3 className="text-lg font-semibold text-[#111827] mb-2 hover:text-blue-600 cursor-pointer">
                                                                {result.title}
                                                            </h3>
                                                            {displayOptions.showAuthors && (
                                                                <p className="text-sm text-gray-600 mb-2">
                                                                    {result.authors}
                                                                </p>
                                                            )}
                                                            {(displayOptions.showJournal || displayOptions.showDOI) && (
                                                                <p className="text-sm text-gray-600 mb-2">
                                                                    {displayOptions.showJournal && `${result.journal} • `}
                                                                    {displayOptions.showJournal && result.year}
                                                                    {displayOptions.showDOI && ` • DOI: ${result.doi}`}
                                                                </p>
                                                            )}
                                                            {displayOptions.showAbstract && (
                                                                <p className="text-gray-700 mb-4 line-clamp-3">
                                                                    {result.abstract}
                                                                </p>
                                                            )}
                                                            {displayOptions.showKeywords && (
                                                                <div className="flex flex-wrap gap-2 mb-4">
                                                                    {result.keywords.map((keyword, idx) => (
                                                                        <span key={idx} className="px-2 py-1 bg-gray-100 text-gray-700 rounded text-xs">
                                                                            {keyword}
                                                                        </span>
                                                                    ))}
                                                                </div>
                                                            )}
                                                            <div className="flex flex-wrap items-center gap-4 text-sm">
                                                                <span className="px-2 py-1 bg-blue-100 text-blue-800 rounded text-xs">{result.articleType}</span>
                                                                {displayOptions.showCitations && (
                                                                    <span className="text-gray-500">{result.citations} citations</span>
                                                                )}
                                                            </div>
                                                        </div>
                                                        <div className="flex flex-col gap-2">
                                                            <button className="text-sm text-blue-600 hover:text-blue-700">Save</button>
                                                            <button className="text-sm text-blue-600 hover:text-blue-700">Share</button>
                                                            <button className="text-sm text-blue-600 hover:text-blue-700">View Details</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        {/* Summary */}
                                        {(() => {
                                            const summary = generateSummary(query, results);
                                            return (
                                                <div className="bg-blue-50 border border-blue-200 rounded-lg p-6">
                                                    <h3 className="text-lg font-semibold text-blue-900 mb-2">AI Summary</h3>
                                                    <p className="text-blue-800 mb-4">
                                                        {summary.text}
                                                    </p>
                                                    <div className="flex items-center gap-4 text-sm text-blue-700">
                                                        <span>Overall Confidence: {summary.confidence}%</span>
                                                        <span>Consensus: {summary.consensus}</span>
                                                        <span>Evidence Quality: {summary.quality}</span>
                                                    </div>
                                                </div>
                                            );
                                        })()}
                                    </>
                                )}
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<SearchResults />, document.getElementById('root'));
    </script>
</body>
</html>
