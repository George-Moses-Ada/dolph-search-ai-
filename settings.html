<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Dolph Search</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .toggle-switch {
            position: relative;
            width: 48px;
            height: 24px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider {
            background-color: #2563eb;
        }
        input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function Settings() {
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [user, setUser] = useState(null);
            const [settings, setSettings] = useState({
                searchPreferences: {
                    defaultSearchType: 'all',
                    resultsPerPage: '20',
                    autoSearch: true,
                    showCitations: true
                },
                account: {
                    emailNotifications: true,
                    searchHistory: true,
                    personalization: true,
                    dataSharing: false
                },
                appearance: {
                    theme: 'light',
                    fontSize: 'medium',
                    language: 'en'
                },
                privacy: {
                    profileVisibility: 'private',
                    dataRetention: '1year',
                    analyticsTracking: true
                }
            });
            const [saving, setSaving] = useState(false);
            const [saveMessage, setSaveMessage] = useState('');

            const handleLogout = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                setUser(null);
            };

            useEffect(() => {
                // Load settings from localStorage
                const savedSettings = localStorage.getItem('userSettings');
                if (savedSettings) {
                    setSettings(JSON.parse(savedSettings));
                }

                // Check if user is logged in
                const userData = localStorage.getItem('user');
                if (userData) {
                    setUser(JSON.parse(userData));
                }
            }, []);

            const handleSettingChange = (category, key, value) => {
                setSettings(prev => ({
                    ...prev,
                    [category]: {
                        ...prev[category],
                        [key]: value
                    }
                }));
            };

            const saveSettings = async () => {
                setSaving(true);
                setSaveMessage('');
                
                // Simulate API call
                setTimeout(() => {
                    localStorage.setItem('userSettings', JSON.stringify(settings));
                    setSaving(false);
                    setSaveMessage('Settings saved successfully!');
                    
                    setTimeout(() => setSaveMessage(''), 3000);
                }, 1000);
            };

            const resetSettings = () => {
                if (confirm('Are you sure you want to reset all settings to default?')) {
                    const defaultSettings = {
                        searchPreferences: {
                            defaultSearchType: 'all',
                            resultsPerPage: '20',
                            autoSearch: true,
                            showCitations: true
                        },
                        account: {
                            emailNotifications: true,
                            searchHistory: true,
                            personalization: true,
                            dataSharing: false
                        },
                        appearance: {
                            theme: 'light',
                            fontSize: 'medium',
                            language: 'en'
                        },
                        privacy: {
                            profileVisibility: 'private',
                            dataRetention: '1year',
                            analyticsTracking: true
                        }
                    };
                    setSettings(defaultSettings);
                    localStorage.setItem('userSettings', JSON.stringify(defaultSettings));
                    setSaveMessage('Settings reset to default');
                    setTimeout(() => setSaveMessage(''), 3000);
                }
            };

            return (
                <div className="flex h-screen bg-white">
                    {/* Sidebar */}
                    <aside className={`
                        fixed lg:static inset-y-0 left-0 z-50 w-64 bg-[#f9f9f9] border-r border-[rgba(13,13,13,0.05)]
                        transform transition-transform duration-300 ease-in-out
                        ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}
                    `}>
                        <div className="flex flex-col h-full">
                            {/* Logo */}

                                                    type="checkbox"
                                                    checked={settings.searchPreferences.autoSearch}
                                                    onChange={(e) => handleSettingChange('searchPreferences', 'autoSearch', e.target.checked)}
                                                />
                                                <span className="toggle-slider"></span>
                                            </label>
                                        </div>

                                        <div className="flex items-center justify-between">
                                            <div>
                                                <label className="text-sm font-medium text-gray-700">Show citations</label>
                                                <p className="text-sm text-gray-500">Display citations in search results</p>
                                            </div>
                                            <label className="toggle-switch">
                                                <input
                                                    type="checkbox"
                                                    checked={settings.searchPreferences.showCitations}
                                                    onChange={(e) => handleSettingChange('searchPreferences', 'showCitations', e.target.checked)}
                                                />
                                                <span className="toggle-slider"></span>
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                {/* Account Settings */}
                                <div className="bg-white rounded-lg shadow-sm border border-gray-100 p-6 mb-6">
                                    <h2 className="text-lg font-semibold text-[#111827] mb-4">Account Settings</h2>
                                    
                                    <div className="space-y-4">
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <label className="text-sm font-medium text-gray-700">Email notifications</label>
                                                <p className="text-sm text-gray-500">Receive updates about your searches</p>
                                            </div>
                                            <label className="toggle-switch">
                                                <input
                                                    type="checkbox"
                                                    checked={settings.account.emailNotifications}
                                                    onChange={(e) => handleSettingChange('account', 'emailNotifications', e.target.checked)}
                                                />
                                                <span className="toggle-slider"></span>
                                            </label>
                                        </div>

                                        <div className="flex items-center justify-between">
                                            <div>
                                                <label className="text-sm font-medium text-gray-700">Search history</label>
                                                <p className="text-sm text-gray-500">Save your search history</p>
                                            </div>
                                            <label className="toggle-switch">
                                                <input
                                                    type="checkbox"
                                                    checked={settings.account.searchHistory}
                                                    onChange={(e) => handleSettingChange('account', 'searchHistory', e.target.checked)}
                                                />
                                                <span className="toggle-slider"></span>
                                            </label>
                                        </div>

                                        <div className="flex items-center justify-between">
                                            <div>
                                                <label className="text-sm font-medium text-gray-700">Personalization</label>
                                                <p className="text-sm text-gray-500">Personalize results based on your interests</p>
                                            </div>
                                            <label className="toggle-switch">
                                                <input
                                                    type="checkbox"
                                                    checked={settings.account.personalization}
                                                    onChange={(e) => handleSettingChange('account', 'personalization', e.target.checked)}
                                                />
                                                <span className="toggle-slider"></span>
                                            </label>
                                        </div>

                                        <div className="flex items-center justify-between">
                                            <div>
                                                <label className="text-sm font-medium text-gray-700">Data sharing</label>
                                                <p className="text-sm text-gray-500">Share anonymized data to improve service</p>
                                            </div>
                                            <label className="toggle-switch">
                                                <input
                                                    type="checkbox"
                                                    checked={settings.account.dataSharing}
                                                    onChange={(e) => handleSettingChange('account', 'dataSharing', e.target.checked)}
                                                />
                                                <span className="toggle-slider"></span>
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                {/* Appearance */}
                                <div className="bg-white rounded-lg shadow-sm border border-gray-100 p-6 mb-6">
                                    <h2 className="text-lg font-semibold text-[#111827] mb-4">Appearance</h2>
                                    
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Theme
                                            </label>
                                            <select
                                                value={settings.appearance.theme}
                                                onChange={(e) => handleSettingChange('appearance', 'theme', e.target.value)}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                            >
                                                <option value="light">Light</option>
                                                <option value="dark">Dark</option>
                                                <option value="auto">Auto</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Font size
                                            </label>
                                            <select
                                                value={settings.appearance.fontSize}
                                                onChange={(e) => handleSettingChange('appearance', 'fontSize', e.target.value)}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                            >
                                                <option value="small">Small</option>
                                                <option value="medium">Medium</option>
                                                <option value="large">Large</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Language
                                            </label>
                                            <select
                                                value={settings.appearance.language}
                                                onChange={(e) => handleSettingChange('appearance', 'language', e.target.value)}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                            >
                                                <option value="en">English</option>
                                                <option value="es">Español</option>
                                                <option value="fr">Français</option>
                                                <option value="de">Deutsch</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                {/* Privacy */}
                                <div className="bg-white rounded-lg shadow-sm border border-gray-100 p-6 mb-6">
                                    <h2 className="text-lg font-semibold text-[#111827] mb-4">Privacy</h2>
                                    
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Profile visibility
                                            </label>
                                            <select
                                                value={settings.privacy.profileVisibility}
                                                onChange={(e) => handleSettingChange('privacy', 'profileVisibility', e.target.value)}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                            >
                                                <option value="private">Private</option>
                                                <option value="public">Public</option>
                                                <option value="friends">Friends only</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Data retention
                                            </label>
                                            <select
                                                value={settings.privacy.dataRetention}
                                                onChange={(e) => handleSettingChange('privacy', 'dataRetention', e.target.value)}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                            >
                                                <option value="1month">1 month</option>
                                                <option value="6months">6 months</option>
                                                <option value="1year">1 year</option>
                                                <option value="forever">Forever</option>
                                            </select>
                                        </div>

                                        <div className="flex items-center justify-between">
                                            <div>
                                                <label className="text-sm font-medium text-gray-700">Analytics tracking</label>
                                                <p className="text-sm text-gray-500">Help us improve with usage analytics</p>
                                            </div>
                                            <label className="toggle-switch">
                                                <input
                                                    type="checkbox"
                                                    checked={settings.privacy.analyticsTracking}
                                                    onChange={(e) => handleSettingChange('privacy', 'analyticsTracking', e.target.checked)}
                                                />
                                                <span className="toggle-slider"></span>
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                {/* Action buttons */}
                                <div className="flex gap-4">
                                    <button
                                        onClick={saveSettings}
                                        disabled={saving}
                                        className="bg-[#2563eb] text-white px-6 py-3 rounded-lg hover:bg-blue-600 disabled:opacity-50"
                                    >
                                        {saving ? 'Saving...' : 'Save Settings'}
                                    </button>
                                    <button
                                        onClick={resetSettings}
                                        className="bg-gray-100 text-gray-800 px-6 py-3 rounded-lg hover:bg-gray-200"
                                    >
                                        Reset to Default
                                    </button>
                                </div>
                            </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<Settings />, document.getElementById('root'));
    </script>
</body>
</html>
