<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Dolph Search</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        /* Dark mode styles */
        .dark {
            background-color: #1a1a1a;
            color: #ffffff;
        }
        
        .dark .bg-white {
            background-color: #2d2d2d !important;
        }
        
        .dark .bg-gray-50 {
            background-color: #1a1a1a !important;
        }
        
        .dark .bg-gray-100 {
            background-color: #2d2d2d !important;
        }
        
        .dark .text-gray-600 {
            color: #a0a0a0 !important;
        }
        
        .dark .text-gray-700 {
            color: #e0e0e0 !important;
        }
        
        .dark .text-gray-800 {
            color: #ffffff !important;
        }
        
        .dark .text-gray-900 {
            color: #ffffff !important;
        }
        
        .dark .border-gray-100 {
            border-color: #404040 !important;
        }
        
        .dark .border-gray-200 {
            border-color: #404040 !important;
        }
        
        .dark .border-gray-300 {
            border-color: #404040 !important;
        }
        
        .dark .bg-\[f9f9f9\] {
            background-color: #2d2d2d !important;
        }
        
        .dark .bg-\[2563eb\] {
            background-color: #3b82f6 !important;
        }
        
        /* Enhanced sidebar dark mode */
        .dark aside {
            background-color: #2d2d2d !important;
        }
        
        /* Sidebar links in dark mode */
        .dark .text-\[0d0d0d\] {
            color: #ffffff !important;
        }
        
        .dark .text-\[6b7280\] {
            color: #a0a0a0 !important;
        }
        
        .dark .text-\[8f8f8f\] {
            color: #a0a0a0 !important;
        }
        
        .dark .text-\[111827\] {
            color: #ffffff !important;
        }
        
        /* Border colors for sidebar */
        .dark .border-\[rgba\(13\,13\,13\,0\.05\)\],
        .dark .bg-\[rgba\(13\,13\,13\,0\.05\)\] {
            border-color: #404040 !important;
        }
        
        .dark .hover\:bg-gray-50:hover {
            background-color: #2d2d2d !important;
        }
        
        .dark .hover\:bg-gray-100:hover {
            background-color: #404040 !important;
        }
        
        .dark .hover\:bg-gray-200:hover {
            background-color: #404040 !important;
        }
        
        .dark .hover\:bg-blue-600:hover {
            background-color: #2563eb !important;
        }
        
        /* Form elements */
        .dark input[type="email"],
        .dark input[type="password"],
        .dark input[type="text"],
        .dark select,
        .dark textarea {
            background-color: #404040 !important;
            color: #ffffff !important;
            border-color: #555555 !important;
        }
        
        .dark input[type="email"]:focus,
        .dark input[type="password"]:focus,
        .dark input[type="text"]:focus,
        .dark select:focus,
        .dark textarea:focus {
            background-color: #404040 !important;
            color: #ffffff !important;
            border-color: #3b82f6 !important;
        }
        
        .dark input[type="checkbox"]:checked + .toggle-slider {
            background-color: #3b82f6 !important;
        }
        
        .dark .focus\:outline-none:focus {
            outline-color: #3b82f6 !important;
        }
        
        .dark .focus\:ring-2:focus {
            --tw-ring-color: #3b82f6 !important;
        }
        
        .dark .focus\:ring-blue-500:focus {
            --tw-ring-color: #3b82f6 !important;
        }
        
        /* Buttons */
        .dark .bg-blue-600 {
            background-color: #2563eb !important;
        }
        
        .dark .hover\:bg-blue-600:hover {
            background-color: #1d4ed8 !important;
        }
        
        .dark .text-blue-600 {
            color: #3b82f6 !important;
        }
        
        .dark .hover\:text-blue-600:hover {
            color: #2563eb !important;
        }
        
        /* Shadow elements */
        .dark .shadow-sm {
            box-shadow: 0 1px 2px 0 rgba(255, 255, 255, 0.05) !important;
        }
        
        .dark .shadow-lg {
            box-shadow: 0 10px 15px -3px rgba(255, 255, 255, 0.1), 0 4px 6px -2px rgba(255, 255, 255, 0.05) !important;
        }
        
        /* Success/error messages */
        .dark .bg-green-50 {
            background-color: #064e3b !important;
        }
        
        .dark .text-green-800 {
            color: #6ee7b7 !important;
        }
        
        .dark .border-green-200 {
            border-color: #065f46 !important;
        }
        
        .dark .bg-blue-50 {
            background-color: #1e3a8a !important;
        }
        
        .dark .text-blue-800 {
            color: #93c5fd !important;
        }
        
        .dark .border-blue-200 {
            border-color: #1e40af !important;
        }
        
        .toggle-switch {
            position: relative;
            width: 48px;
            height: 24px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider {
            background-color: #2563eb;
        }
        input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function Settings() {
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [user, setUser] = useState(null);
            const [settings, setSettings] = useState({
                searchPreferences: {
                    defaultSearchType: 'All Search',
                    resultsPerPage: '20',
                    autoSearch: true,
                    showCitations: true
                },
                account: {
                    emailNotifications: true,
                    searchHistory: true,
                    personalization: true,
                    dataSharing: false
                },
                appearance: {
                    theme: 'light',
                    fontSize: 'medium',
                    language: 'en'
                },
                privacy: {
                    profileVisibility: 'private',
                    dataRetention: '1year',
                    analyticsTracking: true
                }
            });
            const [saving, setSaving] = useState(false);
            const [saveMessage, setSaveMessage] = useState('');

            const handleLogout = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                setUser(null);
            };

            useEffect(() => {
                // Load settings from localStorage
                const savedSettings = localStorage.getItem('userSettings');
                if (savedSettings) {
                    setSettings(JSON.parse(savedSettings));
                }

                // Check if user is logged in
                const userData = localStorage.getItem('user');
                if (userData) {
                    setUser(JSON.parse(userData));
                }

                // Apply theme on mount
                const theme = localStorage.getItem('theme') || 'light';
                document.documentElement.className = theme === 'dark' ? 'dark' : '';
            }, []);

            const handleSettingChange = (category, key, value) => {
                setSettings(prev => ({
                    ...prev,
                    [category]: {
                        ...prev[category],
                        [key]: value
                    }
                }));
            };

            const toggleTheme = () => {
                const newTheme = settings.appearance.theme === 'light' ? 'dark' : 'light';
                handleSettingChange('appearance', 'theme', newTheme);
                document.documentElement.className = newTheme === 'dark' ? 'dark' : '';
                localStorage.setItem('theme', newTheme);
            };

            // Language translations
            const translations = {
                en: {
                    settings: 'Settings',
                    manageAccount: 'Manage your account settings and preferences',
                    searchPreferences: 'Search Preferences',
                    defaultSearchType: 'Default Search Type',
                    resultsPerPage: 'Results per page',
                    autoSearch: 'Auto-search',
                    autoSearchDesc: 'Automatically search as you type',
                    showCitations: 'Show citations',
                    showCitationsDesc: 'Display citations in search results',
                    appearance: 'Appearance',
                    theme: 'Theme',
                    themeDesc: 'Choose between light and dark mode',
                    fontSize: 'Font Size',
                    language: 'Language',
                    saveSettings: 'Save Settings',
                    saving: 'Saving...',
                    resetToDefault: 'Reset to Default',
                    settingsSaved: 'Settings saved successfully!',
                    settingsReset: 'Settings reset to default',
                    confirmReset: 'Are you sure you want to reset all settings to default?'
                },
                es: {
                    settings: 'Configuración',
                    manageAccount: 'Administra la configuración y preferencias de tu cuenta',
                    searchPreferences: 'Preferencias de Búsqueda',
                    defaultSearchType: 'Tipo de Búsqueda Predeterminado',
                    resultsPerPage: 'Resultados por página',
                    autoSearch: 'Búsqueda automática',
                    autoSearchDesc: 'Buscar automáticamente mientras escribes',
                    showCitations: 'Mostrar citas',
                    showCitationsDesc: 'Mostrar citas en los resultados de búsqueda',
                    appearance: 'Apariencia',
                    theme: 'Tema',
                    themeDesc: 'Elige entre modo claro y oscuro',
                    fontSize: 'Tamaño de Fuente',
                    language: 'Idioma',
                    saveSettings: 'Guardar Configuración',
                    saving: 'Guardando...',
                    resetToDefault: 'Restablecer Predeterminados',
                    settingsSaved: '¡Configuración guardada exitosamente!',
                    settingsReset: 'Configuración restablecida a predeterminados',
                    confirmReset: '¿Estás seguro de que quieres restablecer toda la configuración a los valores predeterminados?'
                },
                fr: {
                    settings: 'Paramètres',
                    manageAccount: 'Gérez les paramètres et préférences de votre compte',
                    searchPreferences: 'Préférences de Recherche',
                    defaultSearchType: 'Type de Recherche par Défaut',
                    resultsPerPage: 'Résultats par page',
                    autoSearch: 'Recherche automatique',
                    autoSearchDesc: 'Rechercher automatiquement pendant que vous tapez',
                    showCitations: 'Afficher les citations',
                    showCitationsDesc: 'Afficher les citations dans les résultats de recherche',
                    appearance: 'Apparence',
                    theme: 'Thème',
                    themeDesc: 'Choisissez entre le mode clair et sombre',
                    fontSize: 'Taille de Police',
                    language: 'Langue',
                    saveSettings: 'Enregistrer les Paramètres',
                    saving: 'Enregistrement...',
                    resetToDefault: 'Réinitialiser par Défaut',
                    settingsSaved: 'Paramètres enregistrés avec succès!',
                    settingsReset: 'Paramètres réinitialisés par défaut',
                    confirmReset: 'Êtes-vous sûr de vouloir réinitialiser tous les paramètres aux valeurs par défaut?'
                },
                de: {
                    settings: 'Einstellungen',
                    manageAccount: 'Verwalten Sie Ihre Kontoeinstellungen und -präferenzen',
                    searchPreferences: 'Sucheinstellungen',
                    defaultSearchType: 'Standard-Suchtyp',
                    resultsPerPage: 'Ergebnisse pro Seite',
                    autoSearch: 'Automatische Suche',
                    autoSearchDesc: 'Automatisch suchen während der Eingabe',
                    showCitations: 'Zitate anzeigen',
                    showCitationsDesc: 'Zitate in Suchergebnissen anzeigen',
                    appearance: 'Erscheinungsbild',
                    theme: 'Design',
                    themeDesc: 'Wählen Sie zwischen hellem und dunklem Modus',
                    fontSize: 'Schriftgröße',
                    language: 'Sprache',
                    saveSettings: 'Einstellungen speichern',
                    saving: 'Speichern...',
                    resetToDefault: 'Auf Standard zurücksetzen',
                    settingsSaved: 'Einstellungen erfolgreich gespeichert!',
                    settingsReset: 'Einstellungen auf Standard zurückgesetzt',
                    confirmReset: 'Sind Sie sicher, dass Sie alle Einstellungen auf die Standardwerte zurücksetzen möchten?'
                }
            };

            const t = (key) => {
                return translations[settings.appearance.language]?.[key] || translations.en[key] || key;
            };

            const saveSettings = async () => {
                setSaving(true);
                setSaveMessage('');
                
                // Simulate API call
                setTimeout(() => {
                    localStorage.setItem('userSettings', JSON.stringify(settings));
                    localStorage.setItem('theme', settings.appearance.theme);
                    setSaving(false);
                    setSaveMessage(t('settingsSaved'));
                    
                    setTimeout(() => setSaveMessage(''), 3000);
                }, 1000);
            };

            const resetSettings = () => {
                if (confirm(t('confirmReset'))) {
                    const defaultSettings = {
                        searchPreferences: {
                            defaultSearchType: 'All Search',
                            resultsPerPage: '20',
                            autoSearch: true,
                            showCitations: true
                        },
                        account: {
                            emailNotifications: true,
                            searchHistory: true,
                            personalization: true,
                            dataSharing: false
                        },
                        appearance: {
                            theme: 'light',
                            fontSize: 'medium',
                            language: 'en'
                        },
                        privacy: {
                            profileVisibility: 'private',
                            dataRetention: '1year',
                            analyticsTracking: true
                        }
                    };
                    setSettings(defaultSettings);
                    localStorage.setItem('userSettings', JSON.stringify(defaultSettings));
                    setSaveMessage(t('settingsReset'));
                    setTimeout(() => setSaveMessage(''), 3000);
                }
            };

            return (
                <div className="flex h-screen bg-white">
                    {/* Sidebar */}
                    <aside className={`
                        fixed lg:static inset-y-0 left-0 z-50 w-64 bg-[#f9f9f9] border-r border-[rgba(13,13,13,0.05)]
                        transform transition-transform duration-300 ease-in-out
                        ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}
                    `}>
                        <div className="flex flex-col h-full">
                            {/* Logo */}
                            <div className="flex items-center justify-between p-4 h-[52px]">
                                <div className="flex items-center gap-2 cursor-pointer" onClick={() => window.location.href = 'index.html'}>
                                    <div className="w-8 h-8 bg-[#2563eb] rounded-full flex items-center justify-center">
                                        <span className="text-white text-sm font-bold">D</span>
                                    </div>
                                    <span className="font-semibold text-base text-gray-900">Dolph Search</span>
                                </div>
                                <button
                                    onClick={() => setSidebarOpen(false)}
                                    className="lg:hidden p-2 hover:bg-gray-200 rounded-lg"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                            </div>

                            {/* Navigation */}
                            <nav className="flex-1 px-2 py-2">
                            </nav>

                            {/* Bottom section */}
                            <div className="border-t border-[rgba(13,13,13,0.05)] p-2">
                                <a href="plans.html" className="w-full flex items-center gap-2 px-3 py-2 hover:bg-gray-200 rounded-lg text-left">
                                    <svg className="w-5 h-5 text-[#0d0d0d]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                                    </svg>
                                    <span className="text-sm text-[#0d0d0d]">See plans and pricing</span>
                                </a>

                                <a href="settings.html" className="w-full flex items-center gap-2 px-3 py-2 bg-[#2563eb] text-white rounded-lg text-left">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    </svg>
                                    <span className="text-sm">Settings</span>
                                </a>

                                <a href="help.html" className="w-full flex items-center gap-2 px-3 py-2 hover:bg-gray-200 rounded-lg text-left">
                                    <svg className="w-5 h-5 text-[#0d0d0d]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                    <span className="text-sm text-[#0d0d0d]">Help</span>
                                </a>

                                {user ? (
                                    <div className="mt-4 p-4 bg-white rounded-lg">
                                        <div className="flex items-center gap-3">
                                            <div className="w-8 h-8 bg-[#2563eb] rounded-full flex items-center justify-center">
                                                <span className="text-white text-sm font-medium">{user.name.charAt(0).toUpperCase()}</span>
                                            </div>
                                            <div className="flex-1">
                                                <p className="text-sm font-normal text-[#111827]">{user.name}</p>
                                                <p className="text-xs text-[#6b7280]">{user.email}</p>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="mt-4 p-4 bg-white rounded-lg">
                                        <p className="text-sm font-normal text-[#0d0d0d] mb-2">Get responses tailored to you</p>
                                        <p className="text-sm text-[#8f8f8f] mb-4">Log in to get answers based on your inputs, plus upload files.</p>
                                        <a href="login.html" className="w-full bg-[#2563eb] text-white py-2 px-4 rounded-full text-sm hover:bg-blue-600 inline-block text-center">
                                            Log in
                                        </a>
                                    </div>
                                )}
                            </div>
                        </div>
                    </aside>

                    {/* Mobile sidebar overlay */}
                    {sidebarOpen && (
                        <div
                            className="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden"
                            onClick={() => setSidebarOpen(false)}
                        />
                    )}

                    {/* Main content */}
                    <main className="flex-1 h-screen overflow-y-auto">
                        {/* Header */}
                        <header className="fixed top-0 left-0 right-0 h-[52px] bg-white border-b border-gray-200 flex items-center justify-between px-4 z-30">
                            <div className="flex items-center gap-2">
                                <div className="lg:hidden flex items-center gap-2 cursor-pointer" onClick={() => window.location.href = 'index.html'}>
                                    <div className="w-8 h-8 bg-[#2563eb] rounded-full flex items-center justify-center">
                                        <span className="text-white text-sm font-bold">D</span>
                                    </div>
                                    <span className="font-semibold text-base text-gray-900">Dolph Search</span>
                                </div>
                                <a href="index.html" className="hidden lg:flex items-center gap-2 text-gray-600 hover:text-gray-900 px-2 py-1 rounded hover:bg-gray-100">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                                    </svg>
                                    <span className="text-sm">Back</span>
                                </a>
                            </div>
                            <div className="flex-1" />

                            <div className="flex items-center gap-2">
                                <button
                                    onClick={() => setSidebarOpen(true)}
                                    className="lg:hidden p-2 hover:bg-gray-100 rounded-lg"
                                >
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                                    </svg>
                                </button>
                                {user ? (
                                    <div className="hidden lg:flex items-center gap-3">
                                        <div className="w-8 h-8 bg-[#2563eb] rounded-full flex items-center justify-center">
                                            <span className="text-white text-sm font-medium">{user.name.charAt(0).toUpperCase()}</span>
                                        </div>
                                        <span className="text-sm text-[#111827]">{user.name}</span>
                                        <button onClick={handleLogout} className="text-sm text-[#6b7280] hover:text-[#111827]">
                                            Log out
                                        </button>
                                    </div>
                                ) : (
                                    <>
                                        <a href="login.html" className="hidden lg:flex bg-[#2563eb] text-white px-4 py-2 rounded-full text-sm hover:bg-blue-600">
                                            Log in
                                        </a>
                                        <a href="signup.html" className="hidden lg:flex bg-white border border-gray-300 px-4 py-2 rounded-full text-sm hover:bg-gray-50">
                                            Sign up for free
                                        </a>
                                    </>
                                )}
                            </div>
                        </header>

                        {/* Settings content with proper spacing for fixed header */}
                        <div className="max-w-4xl mx-auto p-6 pt-[72px]">
                            {/* Header */}
                            <div className="bg-white rounded-lg shadow-sm border border-gray-100 p-6 mb-6">
                                <h1 className="text-2xl font-bold text-[#111827] mb-2">{t('settings')}</h1>
                                <p className="text-gray-600">{t('manageAccount')}</p>
                            </div>

                            {/* Save message */}
                            {saveMessage && (
                                <div className={`mb-4 p-4 rounded-lg ${
                                    saveMessage.includes('success') || saveMessage.includes('successfully') || saveMessage.includes('éxito') || saveMessage.includes('succès') || saveMessage.includes('erfolgreich')
                                        ? 'bg-green-50 text-green-800 border border-green-200' 
                                        : 'bg-blue-50 text-blue-800 border border-blue-200'
                                }`}>
                                    {saveMessage}
                                </div>
                            )}

                            {/* Search Preferences */}
                            <div className="bg-white rounded-lg shadow-sm border border-gray-100 p-6 mb-6">
                                <h2 className="text-lg font-semibold text-[#111827] mb-4">{t('searchPreferences')}</h2>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            {t('defaultSearchType')}
                                        </label>
                                        <select
                                            value={settings.searchPreferences.defaultSearchType}
                                            onChange={(e) => handleSettingChange('searchPreferences', 'defaultSearchType', e.target.value)}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        >
                                            <option value="All Search">All Search</option>
                                            <option value="PubMed">PubMed</option>
                                            <option value="arXiv">arXiv</option>
                                            <option value="Semantic Scholar">Semantic Scholar</option>
                                            <option value="Europe PMC">Europe PMC</option>
                                            <option value="CrossRef">CrossRef</option>
                                            <option value="Scopus">Scopus</option>
                                            <option value="Nature">Nature</option>
                                            <option value="Cell">Cell</option>
                                            <option value="JAMA">JAMA</option>
                                            <option value="NEJM">NEJM</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            {t('resultsPerPage')}
                                        </label>
                                        <select
                                            value={settings.searchPreferences.resultsPerPage}
                                            onChange={(e) => handleSettingChange('searchPreferences', 'resultsPerPage', e.target.value)}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        >
                                            <option value="10">10</option>
                                            <option value="20">20</option>
                                            <option value="50">50</option>
                                            <option value="100">100</option>
                                        </select>
                                    </div>

                                    <div className="flex items-center justify-between">
                                        <div>
                                            <label className="text-sm font-medium text-gray-700">{t('autoSearch')}</label>
                                            <p className="text-sm text-gray-500">{t('autoSearchDesc')}</p>
                                        </div>
                                        <label className="toggle-switch">
                                            <input
                                                type="checkbox"
                                                checked={settings.searchPreferences.autoSearch}
                                                onChange={(e) => handleSettingChange('searchPreferences', 'autoSearch', e.target.checked)}
                                            />
                                            <span className="toggle-slider"></span>
                                        </label>
                                    </div>

                                    <div className="flex items-center justify-between">
                                        <div>
                                            <label className="text-sm font-medium text-gray-700">{t('showCitations')}</label>
                                            <p className="text-sm text-gray-500">{t('showCitationsDesc')}</p>
                                        </div>
                                        <label className="toggle-switch">
                                            <input
                                                type="checkbox"
                                                checked={settings.searchPreferences.showCitations}
                                                onChange={(e) => handleSettingChange('searchPreferences', 'showCitations', e.target.checked)}
                                            />
                                            <span className="toggle-slider"></span>
                                        </label>
                                    </div>
                                </div>
                            </div>

                            {/* Appearance */}
                            <div className="bg-white rounded-lg shadow-sm border border-gray-100 p-6 mb-6">
                                <h2 className="text-lg font-semibold text-[#111827] mb-4">{t('appearance')}</h2>
                                
                                <div className="space-y-4">
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <label className="text-sm font-medium text-gray-700">{t('theme')}</label>
                                            <p className="text-sm text-gray-500">{t('themeDesc')}</p>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-sm text-gray-600">☀️</span>
                                            <label className="toggle-switch">
                                                <input
                                                    type="checkbox"
                                                    checked={settings.appearance.theme === 'dark'}
                                                    onChange={toggleTheme}
                                                />
                                                <span className="toggle-slider"></span>
                                            </label>
                                            <span className="text-sm text-gray-600">🌙</span>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            {t('fontSize')}
                                        </label>
                                        <select
                                            value={settings.appearance.fontSize}
                                            onChange={(e) => handleSettingChange('appearance', 'fontSize', e.target.value)}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        >
                                            <option value="small">Small</option>
                                            <option value="medium">Medium</option>
                                            <option value="large">Large</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            {t('language')}
                                        </label>
                                        <select
                                            value={settings.appearance.language}
                                            onChange={(e) => handleSettingChange('appearance', 'language', e.target.value)}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        >
                                            <option value="en">English</option>
                                            <option value="es">Español</option>
                                            <option value="fr">Français</option>
                                            <option value="de">Deutsch</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            {/* Action buttons */}
                            <div className="flex gap-4">
                                <button
                                    onClick={saveSettings}
                                    disabled={saving}
                                    className="bg-[#2563eb] text-white px-6 py-3 rounded-lg hover:bg-blue-600 disabled:opacity-50"
                                >
                                    {saving ? t('saving') : t('saveSettings')}
                                </button>
                                <button
                                    onClick={resetSettings}
                                    className="bg-gray-100 text-gray-800 px-6 py-3 rounded-lg hover:bg-gray-200"
                                >
                                    {t('resetToDefault')}
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<Settings />, document.getElementById('root'));
    </script>
</body>
</html>
